name: CDK Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: cdk-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-northeast-1
      AWS_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsCdkRole

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: lambda/go.mod
          cache-dependency-path: lambda/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: infra/package.json
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        working-directory: infra
        run: npm ci

      - name: Build Lambda artifacts
        working-directory: lambda
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: arm64
        run: |
          mkdir -p dist/cost-notification
          go build -trimpath -ldflags="-s -w" -o dist/cost-notification/bootstrap ./cmd/cost-notification
          mkdir -p dist/post-discord
          go build -trimpath -ldflags="-s -w" -o dist/post-discord/bootstrap ./cmd/post-discord

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Deploy CDK Stack
        working-directory: infra
        run: npx cdk deploy --all --require-approval never
